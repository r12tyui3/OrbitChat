# Author: Ritika Singh
name: ci

# Minimal permissions for GITHUB_TOKEN
permissions:
  contents: read

# Avoid duplicate builds and scope triggers
on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
      - '**/*.gradle'
      - '**/Dockerfile'
      - '**/package.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
      - '**/*.gradle'
      - '**/Dockerfile'
      - '**/package.json'

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # NOTE: Consider pinning to a commit SHA for supply-chain hardening
        uses: actions/checkout@v4

      # ------------------ Web build ------------------
      - name: Setup Node.js
        # NOTE: Consider pinning to a commit SHA for supply-chain hardening
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # cache: 'npm' # Skipped because no package-lock.json is present in apps/web

      - name: Install dependencies (web)
        working-directory: apps/web
        run: npm install

      - name: Build Web
        working-directory: apps/web
        run: npm run build

      - name: Upload Web Artifact
        # NOTE: Consider pinning to a commit SHA for supply-chain hardening
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      # ------------------ API build ------------------
      # The Gradle wrapper in the repository is incomplete on Windows (missing gradle-wrapper.jar),
      # so we build using Docker for reliability on Linux runners.
      - name: Build API (Docker)
        run: |
          docker build -t orbitchat-api:ci ./apps/api

      # Extract the packaged JAR from the Docker image for artifact upload
      - name: Extract API JAR
        run: |
          mkdir -p apps/api/build/libs
          CID=$(docker create orbitchat-api:ci)
          docker cp "$CID":/app/app.jar apps/api/build/libs/app.jar
          docker rm "$CID"

      - name: Upload API Artifact
        # NOTE: Consider pinning to a commit SHA for supply-chain hardening
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: apps/api/build/libs/*.jar

      # ------------------ Notes ------------------
      # - Tests are not run here because the current repo lacks a complete Gradle wrapper and
      #   service orchestration for DB/Redis during CI. Once the wrapper is fixed or Gradle is
      #   provisioned in CI, replace the Docker build with a Gradle invocation that runs tests:
      #     working-directory: apps/api
      #     run: ./gradlew --no-daemon test bootJar
      #   Or run tests using a Gradle Docker image joined to services.
