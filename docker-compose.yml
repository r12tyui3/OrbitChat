# Author: Ritika Singh
version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbitchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    environment:
      SPRING_DATASOURCE_URL: r2dbc:postgresql://postgres:5432/orbitchat
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/orbitchat
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  web:
    build: ./apps/web
    depends_on:
      - api
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  postgres_data: